name: Spider Jar Gen CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 9477386

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Install build-tools
        run: sdkmanager "build-tools;33.0.0" "platforms;android-33"

      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew app:buildCustomSpiderJar --stacktrace

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: custom_spider
          path: |
            jar/custom_spider.jar
            jar/custom_spider.jar.md5

      - name: Commit and push JAR
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add jar/custom_spider.jar jar/custom_spider.jar.md5 json/index.json
          git diff --cached --quiet || (git commit -m "update spider jar and json" && git push)







